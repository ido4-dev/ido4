name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run build
      - run: npm run test

      - name: Build spec-format bundle
        run: npm run build:bundle -w @ido4/spec-format

      - name: Smoke test spec-format bundle
        run: |
          node packages/spec-format/dist/spec-validator.bundle.js \
            tests/fixtures/strategic-spec-context-pipeline.md \
            | jq -e '.valid == true and .meta.parserVersion != "unknown"'
