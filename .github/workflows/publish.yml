name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm run test

      - name: Build spec-format bundle
        run: npm run build:bundle -w @ido4/spec-format

      - name: Build tech-spec-format bundle
        run: npm run build:bundle -w @ido4/tech-spec-format

      - name: Read spec-format version
        id: spec-format-version
        run: echo "version=$(jq -r '.version' packages/spec-format/package.json)" >> $GITHUB_OUTPUT

      - name: Read tech-spec-format version
        id: tech-spec-format-version
        run: echo "version=$(jq -r '.version' packages/tech-spec-format/package.json)" >> $GITHUB_OUTPUT

      - name: Publish @ido4/spec-format
        run: npm publish --access public
        working-directory: packages/spec-format
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ido4/tech-spec-format
        run: npm publish --access public
        working-directory: packages/tech-spec-format
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ido4/core
        run: npm publish --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ido4/mcp
        run: npm publish --access public
        working-directory: packages/mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dispatch bundle update to ido4shape
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.IDO4SHAPE_DISPATCH_TOKEN }}
          repository: ido4-dev/ido4shape
          event-type: spec-format-published
          client-payload: '{"version": "${{ steps.spec-format-version.outputs.version }}"}'

      # NOTE: TWO parallel dispatch steps to ido4specs will be added in Phase 5
      # of the ido4specs extraction. ido4specs bundles BOTH parsers (the
      # technical-spec validator AND the strategic-spec validator that
      # /ido4specs:create-spec uses to parse upstream strategic specs from
      # ido4shape), so both bundles need auto-update flows:
      #
      #   1. Dispatch bundle update to ido4specs (tech-spec-format)
      #      → repository_dispatch type: tech-spec-format-published
      #      → target: ido4specs/.github/workflows/update-tech-spec-validator.yml
      #
      #   2. Dispatch bundle update to ido4specs (spec-format)
      #      → repository_dispatch type: spec-format-published
      #      → target: ido4specs/.github/workflows/update-spec-validator.yml
      #      → mirrors the ido4shape spec-format dispatch above (same payload)
      #
      # Both target workflows already exist in the ido4specs local repo. Phase 5
      # creates the GitHub repo (ido4-dev/ido4specs), creates the
      # IDO4SPECS_DISPATCH_TOKEN secret, and adds these two steps. Until then,
      # ido4specs bundle updates can be triggered manually via its
      # scripts/update-tech-spec-validator.sh and scripts/update-spec-validator.sh.
      # See ido4specs/docs/extraction-plan.md §10 and ido4-suite/PLAN.md Phase 9.5.4.
